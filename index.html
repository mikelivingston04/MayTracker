<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Strike Challenge Tracker · Mike</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141414;
      --bg2: #1c1c1c;
      --bg3: #202020;
      --bg4: #2a2a2a;
      --border: #303030;
      --text: #f0f0f0;
      --muted: #a0a0a0;
      --muted2: #888;
      --muted3: #666;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --accent: #f97316;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Oswald', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    #header {
      background: var(--bg2);
      padding: 20px 20px 14px;
      border-bottom: 2px solid var(--accent);
    }
    #header .gym-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--accent);
      margin-bottom: 3px;
    }
    #header h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    #header .sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 2px;
    }

    /* VIEW TOGGLE */
    #view-toggle {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    #view-toggle button {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 3px;
      cursor: pointer;
      font-family: 'Arial', monospace;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    #view-toggle button.active {
      background: var(--bg4);
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* DAY TABS */
    #day-tabs {
      display: flex;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    #day-tabs button {
      padding: 10px 14px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted2);
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Arial', monospace;
      transition: color 0.2s;
    }
    #day-tabs button.active {
      background: var(--bg4);
      font-weight: 700;
    }

    /* MAIN */
    #main {
      padding: 16px 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* LOG VIEW */
    .section-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #date-input-wrap { margin-bottom: 18px; }
    #date-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid #f9731633;
      border-radius: 4px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 16px;
      font-family: 'Arial', monospace;
      outline: none;
    }
    #date-input:focus { border-color: var(--accent); }

    #exercises { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .exercise-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .exercise-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .exercise-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex: 1;
      padding-right: 8px;
      line-height: 1.3;
    }
    .exercise-baseline { text-align: right; flex-shrink: 0; }
    .exercise-baseline .label { font-size: 8px; color: var(--muted2); letter-spacing: 1px; }
    .exercise-baseline .value { font-size: 14px; font-weight: 700; color: var(--accent); }
    .exercise-input-row { display: flex; gap: 8px; align-items: center; }
    .rep-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 16px;
      font-family: 'Arial', monospace;
      outline: none;
    }
    .rep-input:focus, .rep-input.has-value { border-color: var(--accent); }
    .delta {
      font-size: 13px;
      font-weight: 900;
      min-width: 44px;
      text-align: center;
    }
    .delta.up { color: var(--green); }
    .delta.down { color: var(--red); }
    .best-label {
      font-size: 9px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .best-label span { color: var(--amber); }

    #save-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 3px;
      cursor: pointer;
      font-family: 'Arial', monospace;
      margin-bottom: 16px;
    }
    #save-btn:active { opacity: 0.85; }

    #save-confirm {
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--green);
      height: 16px;
      margin-bottom: 8px;
    }

    /* PROGRESS VIEW */
    #progress-list { display: flex; flex-direction: column; gap: 10px; }

    .progress-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .progress-name { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
    .progress-stats { display: flex; gap: 14px; }
    .stat { text-align: center; }
    .stat .slabel { font-size: 8px; color: var(--muted2); letter-spacing: 1px; }
    .stat .sval { font-size: 14px; font-weight: 700; }
    .chart {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 44px;
      margin-bottom: 4px;
    }
    .bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      border-radius: 2px 2px 0 0;
      transition: height 0.3s;
      min-height: 4px;
    }
    .bar.baseline { background: var(--muted3); }
    .bar-date { font-size: 7px; color: var(--muted2); margin-top: 2px; letter-spacing: 0; }
    .pct-label { font-size: 9px; letter-spacing: 1px; margin-top: 4px; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted3);
      font-size: 11px;
      letter-spacing: 2px;
    }

    /* HISTORY SECTION */
    #history-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .history-entry {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .history-date {
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delete-btn {
      background: none;
      border: 1px solid #3a1a1a;
      color: var(--red);
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    .history-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      padding: 2px 0;
      border-bottom: 1px solid #161616;
    }
    .history-row:last-child { border-bottom: none; }
    .history-ex { color: var(--muted); }
    .history-val { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>

<div id="header">
  <div class="gym-label">STRIKE GYM</div>
  <h1>APRIL/MAY CHALLENGE</h1>
  <div class="sub">MIKE · BASELINE 4/18 · ENDS MAY 31</div>
</div>

<div id="view-toggle">
  <button id="btn-log" class="active" onclick="setView('log')">📋 LOG SESSION</button>
  <button id="btn-progress" onclick="setView('progress')">📈 PROGRESS</button>
  <button id="btn-history" onclick="setView('history')">🗂 HISTORY</button>
</div>

<div id="day-tabs"></div>
<div id="main"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const BASELINE = {
  "Double Unders": 7,
  "Regular Rope": 122,
  "Plyo Pushups": 12,
  "Regular Pushups": 22,
  "Suicide Switch Lunges (Floor)": 40,
  "Suicide Switch Lunges (Benches)": 35,
  "Jump Squats": 26,
  "Assault Bike (cal)": 39.9,
  "Sled Push 90lbs": 4,
  "Chin Ups": 2,
  "Head Bangers": 12,
  "Pull Ups": 0,
  "Double Bar Rows": 15,
  "Hamstring Crab Tables": 20,
  "Double Sliders": 9,
  "Dips (Ab Bench)": 6.5,
  "Dips (Straight Legs)": 15,
  "Pike Pushups": 10,
  "Pike Pushups (Knees on Bench)": 22,
  "Straight Leg Raises": 16,
  "Low Plank Hold (sec)": 35.0,
  "V Sit Hold (sec)": 52.5,
};

const DAYS = {
  "Day A — Push": [
    "Plyo Pushups",
    "Pike Pushups",
    "Pike Pushups (Knees on Bench)",
    "Dips (Straight Legs)",
    "Dips (Ab Bench)",
    "Regular Pushups",
  ],
  "Day B — Pull": [
    "Pull Ups",
    "Chin Ups",
    "Double Bar Rows",
    "Head Bangers",
  ],
  "Day C — Legs + Core + Cardio": [
    "Sled Push 90lbs",
    "Jump Squats",
    "Suicide Switch Lunges (Floor)",
    "Suicide Switch Lunges (Benches)",
    "Assault Bike (cal)",
    "Straight Leg Raises",
    "Low Plank Hold (sec)",
    "V Sit Hold (sec)",
    "Double Unders",
    "Regular Rope",
    "Hamstring Crab Tables",
    "Double Sliders",
  ],
};

const ACCENTS = {
  "Day A — Push": "#f97316",
  "Day B — Pull": "#3b82f6",
  "Day C — Legs + Core + Cardio": "#22c55e",
};

// ─── STATE ──────────────────────────────────────────────────────────────────

let sessions = {};   // { "4/25": { "Pull Ups": 3, ... }, ... }
let activeDay = "Day A — Push";
let currentView = "log";
let inputs = {};

function loadFromStorage() {
  try {
    const raw = localStorage.getItem("strike_sessions_v1");
    if (raw) sessions = JSON.parse(raw);
  } catch(e) { sessions = {}; }
}

function saveToStorage() {
  localStorage.setItem("strike_sessions_v1", JSON.stringify(sessions));
}

function allDates() {
  return Object.keys(sessions).sort((a, b) => {
    const parse = s => { const [m,d] = s.split("/"); return m*100 + (+d||0); };
    return parse(a) - parse(b);
  });
}

function getBest(exercise) {
  let best = BASELINE[exercise] ?? 0;
  allDates().forEach(d => {
    const v = sessions[d]?.[exercise];
    if (v !== undefined && v > best) best = v;
  });
  return best;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function setAccent(day) {
  const a = ACCENTS[day] || "#f97316";
  document.documentElement.style.setProperty("--accent", a);
}

function setView(v) {
  currentView = v;
  ["log","progress","history"].forEach(n => {
    document.getElementById("btn-"+n).classList.toggle("active", n === v);
  });
  render();
}

function setDay(day) {
  activeDay = day;
  inputs = {};
  setAccent(day);
  renderDayTabs();
  render();
}

function renderDayTabs() {
  const container = document.getElementById("day-tabs");
  container.innerHTML = Object.keys(DAYS).map(day => {
    const accent = ACCENTS[day];
    const active = day === activeDay;
    return `<button 
      onclick="setDay('${day.replace(/'/g, "\\'")}')"
      class="${active ? 'active' : ''}"
      style="${active ? `color:${accent};border-bottom-color:${accent}` : ''}"
    >${day.split("—")[0].trim().toUpperCase()}</button>`;
  }).join("");
}

function render() {
  const main = document.getElementById("main");
  if (currentView === "log") main.innerHTML = renderLog();
  else if (currentView === "progress") main.innerHTML = renderProgress();
  else main.innerHTML = renderHistory();
  attachInputListeners();
}

function renderLog() {
  const exercises = DAYS[activeDay];
  const accent = ACCENTS[activeDay];

  const cards = exercises.map(ex => {
    const base = BASELINE[ex];
    const best = getBest(ex);
    const val = inputs[ex];
    const hasVal = val !== undefined && val !== "";
    const numVal = parseFloat(val);
    const delta = hasVal && base !== undefined ? numVal - base : null;
    const deltaHtml = delta !== null
      ? `<div class="delta ${delta >= 0 ? 'up' : 'down'}">${delta >= 0 ? '+' : ''}${delta.toFixed(1)}</div>`
      : "";
    const bestHtml = best > (base ?? 0)
      ? `<div class="best-label">BEST SO FAR: <span>${best}</span></div>`
      : "";

    return `
      <div class="exercise-card">
        <div class="exercise-top">
          <div class="exercise-name">${ex.toUpperCase()}</div>
          <div class="exercise-baseline">
            <div class="label">BASELINE</div>
            <div class="value">${base ?? "—"}</div>
          </div>
        </div>
        <div class="exercise-input-row">
          <input class="rep-input ${hasVal ? 'has-value' : ''}"
            type="number" inputmode="decimal"
            placeholder="Today's reps"
            value="${hasVal ? val : ''}"
            data-ex="${ex}"
          />
          ${deltaHtml}
        </div>
        ${bestHtml}
      </div>`;
  }).join("");

  return `
    <div id="date-input-wrap">
      <div class="section-label">SESSION DATE</div>
      <input id="date-input" type="text" placeholder="e.g. 4/25" value="${document.getElementById('date-input')?.value || ''}" />
    </div>
    <div id="exercises">${cards}</div>
    <div id="save-confirm"></div>
    <button id="save-btn" onclick="saveSession()">SAVE SESSION</button>
  `;
}

function attachInputListeners() {
  document.querySelectorAll(".rep-input").forEach(el => {
    el.addEventListener("input", e => {
      const ex = e.target.dataset.ex;
      inputs[ex] = e.target.value;
      render();
      // Re-focus the right input after re-render
      const newEl = document.querySelector(`.rep-input[data-ex="${CSS.escape(ex)}"]`);
      if (newEl) {
        newEl.focus();
        const len = newEl.value.length;
        newEl.setSelectionRange(len, len);
      }
    });
  });
}

function saveSession() {
  const dateEl = document.getElementById("date-input");
  const dateKey = dateEl?.value?.trim();
  if (!dateKey) {
    dateEl?.focus();
    return;
  }

  const entry = sessions[dateKey] || {};
  DAYS[activeDay].forEach(ex => {
    if (inputs[ex] !== undefined && inputs[ex] !== "") {
      entry[ex] = parseFloat(inputs[ex]);
    }
  });
  sessions[dateKey] = entry;
  saveToStorage();

  inputs = {};
  render();

  // Show confirm
  const confirm = document.getElementById("save-confirm");
  if (confirm) {
    confirm.textContent = "✓ SAVED";
    setTimeout(() => { if(confirm) confirm.textContent = ""; }, 2000);
  }
}

function renderProgress() {
  const exercises = DAYS[activeDay];
  const accent = ACCENTS[activeDay];
  const dates = allDates();
  const allDatesWithBase = ["4/18", ...dates];

  const getValue = (date, ex) => {
    if (date === "4/18") return BASELINE[ex];
    return sessions[date]?.[ex];
  };

  const cards = exercises.map(ex => {
    const base = BASELINE[ex] ?? 0;
    const sessionData = allDatesWithBase
      .map(d => ({ date: d, val: getValue(d, ex) }))
      .filter(x => x.val !== undefined);

    if (sessionData.length === 0) return "";

    const best = Math.max(...sessionData.map(s => s.val));
    const latest = sessionData[sessionData.length - 1]?.val ?? base;
    const gain = latest - base;
    const pct = base > 0 ? ((latest - base) / base * 100).toFixed(0) : 0;

    const bars = sessionData.map(({ date, val }) => {
      const h = best > 0 ? Math.max(4, Math.round((val / best) * 44)) : 4;
      const isBase = date === "4/18";
      return `
        <div class="bar-wrap">
          <div class="bar ${isBase ? 'baseline' : ''}" style="height:${h}px;${!isBase ? `background:${accent}` : ''}"></div>
          <div class="bar-date">${date}</div>
        </div>`;
    }).join("");

    const pctLabel = pct > 0
      ? `<div class="pct-label" style="color:${accent}">▲ ${pct}% FROM BASELINE</div>`
      : pct < 0
        ? `<div class="pct-label" style="color:#ef4444">▼ ${Math.abs(pct)}% FROM BASELINE</div>`
        : `<div class="pct-label" style="color:#555">— AT BASELINE</div>`;

    return `
      <div class="progress-card">
        <div class="progress-top">
          <div class="progress-name">${ex.toUpperCase()}</div>
          <div class="progress-stats">
            <div class="stat">
              <div class="slabel">BASE</div>
              <div class="sval" style="color:#555">${base}</div>
            </div>
            <div class="stat">
              <div class="slabel">BEST</div>
              <div class="sval" style="color:#f59e0b">${best}</div>
            </div>
            <div class="stat">
              <div class="slabel">GAIN</div>
              <div class="sval" style="color:${gain >= 0 ? '#22c55e' : '#ef4444'}">${gain >= 0 ? '+' : ''}${gain.toFixed(1)}</div>
            </div>
          </div>
        </div>
        <div class="chart">${bars}</div>
        ${pctLabel}
      </div>`;
  }).join("");

  const empty = !dates.length
    ? `<div class="empty-state">LOG A SESSION TO SEE PROGRESS</div>`
    : "";

  return `<div id="progress-list">${cards || empty}</div>`;
}

function renderHistory() {
  const dates = allDates();
  if (!dates.length) {
    return `<div class="empty-state">NO SESSIONS LOGGED YET</div>`;
  }

  const entries = [...dates].reverse().map(date => {
    const data = sessions[date];
    const rows = Object.entries(data).map(([ex, val]) => {
      const base = BASELINE[ex];
      const delta = base !== undefined ? val - base : null;
      const deltaStr = delta !== null
        ? ` <span style="color:${delta >= 0 ? '#22c55e' : '#ef4444'}">(${delta >= 0 ? '+' : ''}${delta.toFixed(1)})</span>`
        : "";
      return `<div class="history-row">
        <span class="history-ex">${ex}</span>
        <span class="history-val">${val}${deltaStr}</span>
      </div>`;
    }).join("");

    return `
      <div class="history-entry">
        <div class="history-date">
          <span>${date}</span>
          <button class="delete-btn" onclick="deleteSession('${date}')">DELETE</button>
        </div>
        ${rows}
      </div>`;
  }).join("");

  return `
    <div class="section-label" style="margin-bottom:12px">ALL LOGGED SESSIONS</div>
    ${entries}
  `;
}

function deleteSession(date) {
  if (!confirm(`Delete session for ${date}?`)) return;
  delete sessions[date];
  saveToStorage();
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

loadFromStorage();
setAccent(activeDay);
renderDayTabs();
render();
</script>
</body>
</html>
