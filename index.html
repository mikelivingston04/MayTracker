<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Strike Challenge Tracker · Mike</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #0f0f0f;
      --bg3: #111;
      --bg4: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #888;
      --muted2: #777;
      --muted3: #555;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --accent: #f97316;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    #header {
      background: var(--bg2);
      padding: 20px 20px 14px;
      border-bottom: 2px solid var(--accent);
    }
    #header .gym-label { font-size: 10px; letter-spacing: 4px; color: var(--accent); margin-bottom: 3px; font-family: Arial, sans-serif; }
    #header h1 { font-size: 28px; font-weight: 900; letter-spacing: 1px; line-height: 1; font-family: 'Oswald', sans-serif; text-transform: uppercase; }
    #header .sub { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 2px; font-family: Arial, sans-serif; }

    #view-toggle { display: flex; border-bottom: 1px solid var(--border); }
    #view-toggle button {
      flex: 1; padding: 11px; background: transparent; border: none;
      border-bottom: 2px solid transparent; color: var(--muted);
      font-size: 14px; letter-spacing: 2px; cursor: pointer;
      text-transform: uppercase;
    }
    #view-toggle button.active {
      background: var(--bg4); color: var(--accent); border-bottom-color: var(--accent);
    }

    #day-tabs {
      display: flex; background: #0d0d0d;
      justify-content: space-evenly;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    #day-tabs button {
      padding: 10px 13px; background: transparent; border: none;
      border-bottom: 2px solid transparent; color: var(--muted2);
      font-size: 12px; letter-spacing: 1px; cursor: pointer;
      white-space: nowrap;
    }
    #day-tabs button.active { background: var(--bg4); font-weight: 700; }

    #main { padding: 16px 20px; max-width: 600px; margin: 0 auto; }

    .section-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }

    #date-input-wrap { margin-bottom: 18px; }
    #date-input {
      width: 100%; background: var(--bg3);
      border: 1px solid #f9731633; border-radius: 4px;
      padding: 10px 12px; color: var(--text);
      font-size: 16px; outline: none;
    }
    #date-input:focus { border-color: var(--accent); }

    #exercises { display: flex; flex-direction: column; gap: 0; margin-bottom: 20px; }

    .phase-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 0 6px;
    }
    .phase-header:first-child { padding-top: 0; }
    .phase-pill {
      font-size: 8px; letter-spacing: 2px; font-weight: 900;
      padding: 3px 8px; border-radius: 20px; text-transform: uppercase;
    }
    .phase-line { flex: 1; height: 1px; background: var(--border); }

    .exercise-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px 14px; margin-bottom: 8px;
    }
    .exercise-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 8px;
    }
    .exercise-name-wrap { flex: 1; padding-right: 8px; }
    .exercise-name { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.3; }
    .exercise-note { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; line-height: 1.4; }
    .exercise-baseline { text-align: right; flex-shrink: 0; }
    .exercise-baseline .label { font-size: 10px; color: var(--muted2); letter-spacing: 1px; }
    .exercise-baseline .value { font-size: 20px; font-weight: 700; color: var(--accent); }
    .exercise-input-row { display: flex; gap: 8px; align-items: center; }
    .rep-input {
      flex: 1; background: var(--bg); border: 1px solid #2a2a2a;
      border-radius: 4px; padding: 8px 10px; color: var(--text);
      font-size: 16px; outline: none;
    }
    .rep-input:focus, .rep-input.has-value { border-color: var(--accent); }
    .delta { font-size: 13px; font-weight: 900; min-width: 44px; text-align: center; }
    .delta.up { color: var(--green); }
    .delta.down { color: var(--red); }
    .best-label { font-size: 9px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
    .best-label span { color: var(--amber); }

    #save-confirm { text-align: center; font-size: 10px; letter-spacing: 2px; color: var(--green); height: 16px; margin-bottom: 8px; }
    #save-btn {
      width: 100%; padding: 14px; background: var(--accent);
      border: none; border-radius: 6px; color: #000;
      font-size: 13px; font-weight: 900; letter-spacing: 3px;
      cursor: pointer; margin-bottom: 16px;
      font-family: 'Oswald', sans-serif;
    }
    #save-btn:active { opacity: 0.85; }

    #progress-list { display: flex; flex-direction: column; gap: 10px; }
    .progress-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 14px;
    }
    .progress-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .progress-name { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    .progress-stats { display: flex; gap: 14px; }
    .stat { text-align: center; }
    .stat .slabel { font-size: 8px; color: var(--muted2); letter-spacing: 1px; }
    .stat .sval { font-size: 14px; font-weight: 700; }
    .chart { display: flex; gap: 5px; align-items: flex-end; height: 44px; margin-bottom: 4px; }
    .bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
    .bar { width: 100%; border-radius: 2px 2px 0 0; transition: height 0.3s; min-height: 4px; }
    .bar.baseline { background: var(--muted3); }
    .bar-date { font-size: 7px; color: var(--muted2); margin-top: 2px; }
    .pct-label { font-size: 9px; letter-spacing: 1px; margin-top: 4px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted3); font-size: 11px; letter-spacing: 2px; }

    #history-section { display: flex; flex-direction: column; gap: 10px; }
    .history-entry {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px 14px;
    }
    .history-date {
      font-size: 10px; color: var(--accent); letter-spacing: 2px;
      font-weight: 700; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .delete-btn {
      background: none; border: 1px solid #3a1a1a; color: var(--red);
      font-size: 9px; padding: 2px 8px; border-radius: 3px;
      cursor: pointer; letter-spacing: 1px;
    }
    .history-row {
      display: flex; justify-content: space-between;
      font-size: 10px; padding: 3px 0; border-bottom: 1px solid #161616;
    }
    .history-row:last-child { border-bottom: none; }
    .history-ex { color: var(--muted); }
    .history-val { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>

<div id="header">
  <div class="gym-label">STRIKE GYM</div>
  <h1>APRIL/MAY CHALLENGE</h1>
  <div class="sub">BASELINE 4/18 · ENDS MAY 31</div>
</div>

<div id="view-toggle">
  <button id="btn-log" class="active" onclick="setView('log')">📋 LOG</button>
  <button id="btn-progress" onclick="setView('progress')">📈 PROGRESS</button>
  <button id="btn-history" onclick="setView('history')">🗂 HISTORY</button>
</div>

<div id="day-tabs"></div>
<div id="main"></div>

<script>
const BASELINE = {
  "Double Unders": 7,
  "Regular Rope": 122,
  "Plyo Pushups": 12,
  "Regular Pushups": 22,
  "Suicide Switch Lunges (Floor)": 40,
  "Suicide Switch Lunges (Benches)": 35,
  "Jump Squats": 26,
  "Assault Bike (cal)": 39.9,
  "Sled Push 90lbs": 4,
  "Chin Ups": 2,
  "Head Bangers": 12,
  "Pull Ups": 0,
  "Double Bar Rows": 15,
  "Hamstring Crab Tables": 20,
  "Double Sliders": 9,
  "Dips (Ab Bench)": 6.5,
  "Dips (Straight Legs)": 15,
  "Pike Pushups": 10,
  "Pike Pushups (Knees on Bench)": 22,
  "Straight Leg Raises": 16,
  "Low Plank Hold (sec)": 35.0,
  "V Sit Hold (sec)": 52.5,
};

const DAYS = {
  "Day A — Push": [
    { name: "Double Unders",                  phase: "Warmup",   note: "10 singles → 1 clean double → repeat. Train the wrist snap, not volume." },
    { name: "Regular Rope",                   phase: "Warmup",   note: "Smooth singles 3 min. Focus on rhythm and consistent timing." },
    { name: "Plyo Pushups",                   phase: "Main",     note: "Do FIRST while fresh. 3×5-8 explosive reps. Power not volume — reset between each." },
    { name: "Pike Pushups",                   phase: "Main",     note: "3×8-12. Feet on floor. Drives shoulder strength directly." },
    { name: "Pike Pushups (Knees on Bench)",  phase: "Main",     note: "3×8-12. More load than floor version — sub in when floor feels easy." },
    { name: "Dips (Straight Legs)",           phase: "Main",     note: "3×10-12. Full range, control the descent. Legs straight increases the challenge." },
    { name: "Dips (Ab Bench)",                phase: "Main",     note: "3×10-12. Easier variation — use as burnout or if straight legs are too much." },
    { name: "Regular Pushups",                phase: "Finisher", note: "AMRAP. These hold up under fatigue — use them to burn out the session." },
  ],
  "Day B — Pull": [
    { name: "Pull Ups",       phase: "Warmup",   note: "Dead hang holds ONLY — 3 sets as long as possible. Builds grip and shoulder stability." },
    { name: "Pull Ups",       phase: "Main",     note: "YOUR #1 PRIORITY. Assisted 4×5-8. Minimum assistance for clean full-range reps. Reduce assistance each session." },
    { name: "Chin Ups",       phase: "Main",     note: "3× max reps, assisted if needed. Supinated grip recruits more bicep — builds toward unassisted pull ups." },
    { name: "Double Bar Rows",phase: "Main",     note: "4×10-12. Head over bar. Control the descent — that eccentric builds real strength." },
    { name: "Head Bangers",   phase: "Finisher", note: "3×8-10. Short range at the top. Elbows tucked, squeeze hard." },
  ],
  "Day C — Legs + Cardio + Core": [
    { name: "Assault Bike (cal)",                  phase: "Warmup",   note: "5 min easy pace. Gets legs warm without pre-fatiguing them." },
    { name: "Jump Squats",                         phase: "Main",     note: "Do FIRST. 4×10. Land soft, explode up. Pure leg power — dies fast when tired." },
    { name: "Suicide Switch Lunges (Floor)",       phase: "Main",     note: "3×20. Focus on switch speed — that's what the test rewards." },
    { name: "Suicide Switch Lunges (Benches)",     phase: "Main",     note: "3×15. Harder variation. Sub in once floor lunges feel easy." },
    { name: "Sled Push 90lbs",                     phase: "Main",     note: "4 rounds ~25ft. Build the engine. Test is only 4 lengths — train for more." },
    { name: "Straight Leg Raises",                 phase: "Core",     note: "3×12. Keep lower back flat. Controlled up and down." },
    { name: "Low Plank Hold (sec)",                phase: "Core",     note: "3 holds, as long as possible. Must be flat — no hiking hips. Beat 35 sec." },
    { name: "V Sit Hold (sec)",                    phase: "Core",     note: "3 holds, as long as possible. Legs straight. Beat 52.5 sec." },
    { name: "Assault Bike (cal)",                  phase: "Finisher", note: "3 min all-out. Track your calories — this is your weekly cardio benchmark." },
  ],
  "Other": [
    { name: "Hamstring Crab Tables", phase: "Accessory", note: "Hamstring + glute stability. Good warm-up or add-on for Day C if you have time." },
    { name: "Double Sliders",        phase: "Accessory", note: "Hamstring curl variation. Core and posterior chain. Slot into Day C if you have time." },
  ],
};

const ACCENTS = {
  "Day A — Push":                  "#f97316",
  "Day B — Pull":                  "#3b82f6",
  "Day C — Legs + Cardio + Core":  "#22c55e",
  "Other":                         "#a855f7",
};

const PHASE_COLORS = {
  "Warmup":    { bg: "#1a2a1a", text: "#4ade80" },
  "Main":      { bg: "#1a1f2e", text: "#60a5fa" },
  "Core":      { bg: "#2a1a2e", text: "#c084fc" },
  "Finisher":  { bg: "#2a1a0a", text: "#fb923c" },
  "Accessory": { bg: "#1e1a2a", text: "#a78bfa" },
};

let sessions = {};
let activeDay = "Day A — Push";
let currentView = "log";
let inputs = {};

function loadFromStorage() {
  try {
    const raw = localStorage.getItem("strike_sessions_v2");
    if (raw) sessions = JSON.parse(raw);
  } catch(e) { sessions = {}; }
}

function saveToStorage() {
  localStorage.setItem("strike_sessions_v2", JSON.stringify(sessions));
}

function allDates() {
  return Object.keys(sessions).sort((a, b) => {
    const parse = s => { const [m,d] = s.split("/"); return (+m)*100+(+d||0); };
    return parse(a) - parse(b);
  });
}

function getBest(exName) {
  let best = BASELINE[exName] ?? 0;
  allDates().forEach(d => {
    const v = sessions[d]?.[exName];
    if (v !== undefined && v > best) best = v;
  });
  return best;
}

function setAccent(day) {
  document.documentElement.style.setProperty("--accent", ACCENTS[day] || "#f97316");
}

function setView(v) {
  currentView = v;
  ["log","progress","history"].forEach(n => {
    document.getElementById("btn-"+n).classList.toggle("active", n === v);
  });
  render();
}

function setDay(day) {
  activeDay = day;
  inputs = {};
  setAccent(day);
  renderDayTabs();
  render();
}

function renderDayTabs() {
  const container = document.getElementById("day-tabs");
  const dayKeys = Object.keys(DAYS);
  container.innerHTML = dayKeys.map((day, idx) => {
    const accent = ACCENTS[day];
    const active = day === activeDay;
    const short = day === "Other" ? "OTHER" : day.split("\u2014")[0].trim().toUpperCase();
    return `<button onclick="setDayByIndex(${idx})"
      class="${active ? 'active' : ''}"
      style="${active ? `color:${accent};border-bottom-color:${accent}` : ''}"
    >${short}</button>`;
  }).join("");
}

function setDayByIndex(idx) {
  const day = Object.keys(DAYS)[idx];
  setDay(day);
}

function render() {
  const main = document.getElementById("main");
  if (currentView === "log")           main.innerHTML = renderLog();
  else if (currentView === "progress") main.innerHTML = renderProgress();
  else                                  main.innerHTML = renderHistory();
  attachInputListeners();
}

function renderLog() {
  const exercises = DAYS[activeDay];
  let lastPhase = null;
  const savedDate = document.getElementById("date-input")?.value || "";

  const cards = exercises.map((ex, i) => {
    const base = BASELINE[ex.name];
    const best = getBest(ex.name);
    const val = inputs[ex.name + "_" + i];
    const hasVal = val !== undefined && val !== "";
    const numVal = parseFloat(val);
    const delta = hasVal && base !== undefined ? numVal - base : null;
    const phaseColor = PHASE_COLORS[ex.phase] || { bg: "#1a1a1a", text: "#888" };

    let phaseHeader = "";
    if (ex.phase !== lastPhase) {
      lastPhase = ex.phase;
      phaseHeader = `
        <div class="phase-header">
          <div class="phase-pill" style="background:${phaseColor.bg};color:${phaseColor.text}">${ex.phase}</div>
          <div class="phase-line"></div>
        </div>`;
    }

    const deltaHtml = delta !== null
      ? `<div class="delta ${delta >= 0 ? 'up' : 'down'}">${delta >= 0 ? '+' : ''}${delta.toFixed(1)}</div>`
      : "";
    const bestHtml = best > (base ?? 0)
      ? `<div class="best-label">BEST SO FAR: <span>${best}</span></div>`
      : "";

    return `
      ${phaseHeader}
      <div class="exercise-card">
        <div class="exercise-top">
          <div class="exercise-name-wrap">
            <div class="exercise-name">${ex.name.toUpperCase()}</div>
            <div class="exercise-note">${ex.note}</div>
          </div>
          <div class="exercise-baseline">
            <div class="label">BASELINE</div>
            <div class="value">${base ?? "—"}</div>
          </div>
        </div>
        <div class="exercise-input-row">
          <input class="rep-input ${hasVal ? 'has-value' : ''}"
            type="number" inputmode="decimal"
            placeholder="Today's reps"
            value="${hasVal ? val : ''}"
            data-key="${ex.name}_${i}"
            data-ex="${ex.name}"
          />
          ${deltaHtml}
        </div>
        ${bestHtml}
      </div>`;
  }).join("");

  return `
    <div id="date-input-wrap">
      <div class="section-label">SESSION DATE</div>
      <input id="date-input" type="text" placeholder="e.g. 4/25" value="${savedDate}" />
    </div>
    <div id="exercises">${cards}</div>
    <div id="save-confirm"></div>
    <button id="save-btn" onclick="saveSession()">SAVE SESSION</button>
  `;
}

function attachInputListeners() {
  document.querySelectorAll(".rep-input").forEach(el => {
    el.addEventListener("input", e => {
      const key = e.target.dataset.key;
      const ex = e.target.dataset.ex;
      inputs[key] = e.target.value;
      updateCardInline(e.target, ex);
    });
  });
}

function updateCardInline(input, ex) {
  const card = input.closest(".exercise-card");
  if (!card) return;
  const val = input.value;
  const hasVal = val !== "";
  input.classList.toggle("has-value", hasVal);

  const base = BASELINE[ex];
  const numVal = parseFloat(val);
  const delta = hasVal && base !== undefined ? numVal - base : null;

  let deltaEl = card.querySelector(".delta");
  if (delta !== null) {
    if (!deltaEl) { deltaEl = document.createElement("div"); input.parentNode.appendChild(deltaEl); }
    deltaEl.className = `delta ${delta >= 0 ? "up" : "down"}`;
    deltaEl.textContent = `${delta >= 0 ? "+" : ""}${delta.toFixed(1)}`;
  } else if (deltaEl) {
    deltaEl.remove();
  }
}

function saveSession() {
  const dateEl = document.getElementById("date-input");
  const dateKey = dateEl?.value?.trim();
  if (!dateKey) { dateEl?.focus(); return; }

  const entry = sessions[dateKey] || {};
  const exercises = DAYS[activeDay];
  exercises.forEach((ex, i) => {
    const val = inputs[ex.name + "_" + i];
    if (val !== undefined && val !== "") {
      // For duplicates (like Assault Bike in Day C), last written wins — that's fine
      entry[ex.name] = parseFloat(val);
    }
  });
  sessions[dateKey] = entry;
  saveToStorage();
  inputs = {};
  render();

  const confirm = document.getElementById("save-confirm");
  if (confirm) {
    confirm.textContent = "✓ SAVED";
    setTimeout(() => { if (confirm) confirm.textContent = ""; }, 2000);
  }
}

function renderProgress() {
  const exercises = DAYS[activeDay];
  const accent = ACCENTS[activeDay];
  const dates = allDates();
  const allDatesWithBase = ["4/18", ...dates];
  const getValue = (date, ex) => date === "4/18" ? BASELINE[ex] : sessions[date]?.[ex];

  const seen = new Set();
  const unique = exercises.filter(ex => {
    if (seen.has(ex.name)) return false;
    seen.add(ex.name); return true;
  });

  const cards = unique.map(ex => {
    const base = BASELINE[ex.name] ?? 0;
    const sessionData = allDatesWithBase
      .map(d => ({ date: d, val: getValue(d, ex.name) }))
      .filter(x => x.val !== undefined);
    if (sessionData.length === 0) return "";

    const best = Math.max(...sessionData.map(s => s.val));
    const latest = sessionData[sessionData.length - 1]?.val ?? base;
    const gain = latest - base;
    const pct = base > 0 ? ((latest - base) / base * 100).toFixed(0) : 0;
    const phaseColor = PHASE_COLORS[ex.phase] || { bg: "#1a1a1a", text: "#888" };

    const bars = sessionData.map(({ date, val }) => {
      const h = best > 0 ? Math.max(4, Math.round((val / best) * 44)) : 4;
      const isBase = date === "4/18";
      return `<div class="bar-wrap">
        <div class="bar ${isBase ? 'baseline' : ''}" style="height:${h}px;${!isBase ? `background:${accent}` : ''}"></div>
        <div class="bar-date">${date}</div>
      </div>`;
    }).join("");

    const pctLabel = pct > 0
      ? `<div class="pct-label" style="color:${accent}">▲ ${pct}% FROM BASELINE</div>`
      : pct < 0
        ? `<div class="pct-label" style="color:#ef4444">▼ ${Math.abs(pct)}% FROM BASELINE</div>`
        : `<div class="pct-label" style="color:#555">— AT BASELINE</div>`;

    return `<div class="progress-card">
      <div class="progress-top">
        <div>
          <div class="progress-name">${ex.name.toUpperCase()}</div>
          <div style="margin-top:4px">
            <span class="phase-pill" style="background:${phaseColor.bg};color:${phaseColor.text};font-size:8px;padding:2px 6px;border-radius:20px;letter-spacing:1px">${ex.phase}</span>
          </div>
        </div>
        <div class="progress-stats">
          <div class="stat"><div class="slabel">BASE</div><div class="sval" style="color:#555">${base}</div></div>
          <div class="stat"><div class="slabel">BEST</div><div class="sval" style="color:#f59e0b">${best}</div></div>
          <div class="stat"><div class="slabel">GAIN</div><div class="sval" style="color:${gain >= 0 ? '#22c55e' : '#ef4444'}">${gain >= 0 ? '+' : ''}${gain.toFixed(1)}</div></div>
        </div>
      </div>
      <div class="chart">${bars}</div>
      ${pctLabel}
    </div>`;
  }).join("");

  return `<div id="progress-list">${cards || `<div class="empty-state">LOG A SESSION TO SEE PROGRESS</div>`}</div>`;
}

function renderHistory() {
  const dates = allDates();
  if (!dates.length) return `<div class="empty-state">NO SESSIONS LOGGED YET</div>`;

  const entries = [...dates].reverse().map(date => {
    const data = sessions[date];
    const rows = Object.entries(data).map(([ex, val]) => {
      const base = BASELINE[ex];
      const delta = base !== undefined ? val - base : null;
      const deltaStr = delta !== null
        ? ` <span style="color:${delta >= 0 ? '#22c55e' : '#ef4444'}">(${delta >= 0 ? '+' : ''}${delta.toFixed(1)})</span>`
        : "";
      return `<div class="history-row">
        <span class="history-ex">${ex}</span>
        <span class="history-val">${val}${deltaStr}</span>
      </div>`;
    }).join("");
    return `<div class="history-entry">
      <div class="history-date">
        <span>${date}</span>
        <button class="delete-btn" onclick="deleteSession('${date}')">DELETE</button>
      </div>
      ${rows}
    </div>`;
  }).join("");

  return `
    <div class="section-label" style="margin-bottom:12px">ALL LOGGED SESSIONS</div>
    <div id="history-section">${entries}</div>
  `;
}

function deleteSession(date) {
  if (!confirm(`Delete session for ${date}?`)) return;
  delete sessions[date];
  saveToStorage();
  render();
}

loadFromStorage();
setAccent(activeDay);
renderDayTabs();
render();
</script>
</body>
</html>
